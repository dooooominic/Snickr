{% extends "base.html" %}
{% block title %}Snickr — Edit workspace{% endblock %}
{% block content %}
<div class="px-8 py-6 max-w-lg">
  <h1 class="text-2xl font-black mb-6">Edit workspace</h1>

  <form method="post" action="{{ url_for('edit_workspace', workspace_id=workspace_id) }}" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Workspace name</label>
      <input type="text" name="workspace_name" value="{{ ws.workspace_name }}" required
             class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-slack-side/30 focus:border-slack-side text-sm">
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Description <span class="font-normal text-gray-400">(optional)</span></label>
      <textarea name="workspace_description" rows="3"
                class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-slack-side/30 focus:border-slack-side text-sm">{{ ws.workspace_description or '' }}</textarea>
    </div>

    <div class="flex gap-3">
      <button type="submit"
              class="px-6 py-2.5 bg-slack-side text-white font-semibold rounded hover:bg-slack-top text-sm">
        Save changes
      </button>
      <a href="{{ url_for('workspace', workspace_id=workspace_id) }}"
         class="px-6 py-2.5 border border-gray-300 text-gray-700 rounded hover:bg-gray-50 text-sm inline-flex items-center">
        Cancel
      </a>
    </div>
  </form>
</div>
{% endblock %}
