{% extends "base.html" %}
{% block title %}Snickr — Sign up{% endblock %}
{% block content %}
<h1>Create an account</h1>
<form method="post" action="{{ url_for('register') }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="form-field">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required autofocus>
  </div>
  <div class="form-field">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" required>
  </div>
  <div class="form-field">
    <label for="nickname">Nickname <span class="hint">(optional)</span></label>
    <input type="text" id="nickname" name="nickname">
  </div>
  <div class="form-field">
    <label for="password">Password <span class="hint">(min 6 characters)</span></label>
    <input type="password" id="password" name="password" required minlength="6">
  </div>
  <button type="submit">Sign up</button>
</form>
<p style="margin-top:1rem">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
{% endblock %}
