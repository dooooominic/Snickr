{% extends "base.html" %}
{% block title %}Snickr — Sign up{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto py-8">
  <h1 class="text-2xl font-black mb-6">Create an account</h1>
  <form method="post" action="{{ url_for('register') }}" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
      <label for="email" class="block text-sm font-semibold mb-1">Email</label>
      <input type="email" id="email" name="email" required autofocus
             class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-slack-side/30 focus:border-slack-side">
    </div>
    <div>
      <label for="username" class="block text-sm font-semibold mb-1">Username</label>
      <input type="text" id="username" name="username" required
             class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-slack-side/30 focus:border-slack-side">
    </div>
    <div>
      <label for="nickname" class="block text-sm font-semibold mb-1">Nickname <span class="font-normal text-gray-500">(optional)</span></label>
      <input type="text" id="nickname" name="nickname"
             class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-slack-side/30 focus:border-slack-side">
    </div>
    <div>
      <label for="password" class="block text-sm font-semibold mb-1">Password <span class="font-normal text-gray-500">(min 6 characters)</span></label>
      <input type="password" id="password" name="password" required minlength="6"
             class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-slack-side/30 focus:border-slack-side">
    </div>
    <button type="submit" class="w-full px-4 py-2 bg-slack-side text-white font-semibold rounded hover:bg-slack-top">Sign up</button>
  </form>
  <p class="mt-4 text-sm text-gray-600">Already have an account? <a href="{{ url_for('login') }}" class="text-slack-active hover:underline">Log in</a></p>
</div>
{% endblock %}
