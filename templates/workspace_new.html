{% extends "base.html" %}
{% block title %}Snickr — New workspace{% endblock %}
{% block content %}
<div class="max-w-md mx-auto py-8 px-4">
  <h1 class="text-2xl font-black mb-6">Create a workspace</h1>
  <form method="post" action="{{ url_for('new_workspace') }}" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
      <label for="workspace_name" class="block text-sm font-semibold mb-1">Workspace name</label>
      <input type="text" id="workspace_name" name="workspace_name" required autofocus
             class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-slack-side/30 focus:border-slack-side">
    </div>
    <div>
      <label for="workspace_description" class="block text-sm font-semibold mb-1">Description <span class="font-normal text-gray-500">(optional)</span></label>
      <textarea id="workspace_description" name="workspace_description" rows="3"
                class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-slack-side/30 focus:border-slack-side"></textarea>
    </div>
    <button type="submit" class="px-4 py-2 bg-slack-side text-white font-semibold rounded hover:bg-slack-top">Create workspace</button>
  </form>
  <a href="{{ url_for('dashboard') }}" class="inline-block mt-6 text-sm text-gray-500 hover:underline">&larr; Back to dashboard</a>
</div>
{% endblock %}
