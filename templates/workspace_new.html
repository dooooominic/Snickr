{% extends "base.html" %}
{% block title %}Snickr — New workspace{% endblock %}
{% block content %}
<h1>Create a workspace</h1>
<form method="post" action="{{ url_for('new_workspace') }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="form-field">
    <label for="workspace_name">Workspace name</label>
    <input type="text" id="workspace_name" name="workspace_name" required autofocus>
  </div>
  <div class="form-field">
    <label for="workspace_description">Description <span class="hint">(optional)</span></label>
    <textarea id="workspace_description" name="workspace_description" rows="3"></textarea>
  </div>
  <button type="submit">Create workspace</button>
</form>
<a class="back-link" href="{{ url_for('dashboard') }}">&larr; Back to dashboard</a>
{% endblock %}
