{% extends "base.html" %}
{% block title %}Snickr — New channel{% endblock %}
{% block content %}
<h1>Create a channel</h1>
<form method="post" action="{{ url_for('new_channel', workspace_id=workspace_id) }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="form-field">
    <label for="channel_name">Channel name</label>
    <input type="text" id="channel_name" name="channel_name" required autofocus>
  </div>
  <div class="form-field">
    <label>Type</label>
    <label style="font-weight:normal"><input type="radio" name="channel_type" value="public" checked> Public</label>
    &nbsp;
    <label style="font-weight:normal"><input type="radio" name="channel_type" value="private"> Private</label>
    &nbsp;
    <label style="font-weight:normal"><input type="radio" name="channel_type" value="direct"> Direct (DM)</label>
  </div>
  <div class="form-field">
    <label for="other_username">Other user <span class="hint">(only for direct channels)</span></label>
    <input type="text" id="other_username" name="other_username">
  </div>
  <button type="submit">Create channel</button>
</form>
<a class="back-link" href="{{ url_for('workspace', workspace_id=workspace_id) }}">&larr; Back to workspace</a>
{% endblock %}
