{% extends "base.html" %}
{% block title %}Snickr — Log in{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto py-8">
  <h1 class="text-2xl font-black mb-6">Log in</h1>
  <form method="post" action="{{ url_for('login') }}" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
      <label for="username" class="block text-sm font-semibold mb-1">Username</label>
      <input type="text" id="username" name="username" required autofocus
             class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-slack-side/30 focus:border-slack-side">
    </div>
    <div>
      <label for="password" class="block text-sm font-semibold mb-1">Password</label>
      <input type="password" id="password" name="password" required
             class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-slack-side/30 focus:border-slack-side">
    </div>
    <button type="submit" class="w-full px-4 py-2 bg-slack-side text-white font-semibold rounded hover:bg-slack-top">Log in</button>
  </form>
  <p class="mt-4 text-sm text-gray-600">New here? <a href="{{ url_for('register') }}" class="text-slack-active hover:underline">Create an account</a></p>
</div>
{% endblock %}
