{% extends "base.html" %}
{% block title %}Snickr — Invite to #{{ channel.channel_name }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto py-8 px-4">
  <h1 class="text-2xl font-black mb-6">Invite to # {{ channel.channel_name }}</h1>
  <form method="post" action="{{ url_for('invite_to_channel', channel_id=channel_id) }}" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
      <label for="invitee_username" class="block text-sm font-semibold mb-1">Username</label>
      <input type="text" id="invitee_username" name="invitee_username" required autofocus
             class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100 rounded focus:outline-none focus:ring-2 focus:ring-slack-side/30 focus:border-slack-side">
    </div>
    <p class="text-sm text-gray-500 dark:text-gray-400">The user must already be a member of this workspace.</p>
    <button type="submit" class="px-4 py-2 bg-slack-side text-white font-semibold rounded hover:bg-slack-top">Send invitation</button>
  </form>
  <a href="{{ url_for('channel', channel_id=channel_id) }}" class="inline-block mt-6 text-sm text-gray-500 dark:text-gray-400 hover:underline">&larr; Back to channel</a>
</div>
{% endblock %}
