{% extends "base.html" %}
{% block title %}Snickr — Invite to #{{ channel.channel_name }}{% endblock %}
{% block content %}
<h1>Invite to # {{ channel.channel_name }}</h1>
<form method="post" action="{{ url_for('invite_to_channel', channel_id=channel_id) }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="form-field">
    <label for="invitee_username">Username</label>
    <input type="text" id="invitee_username" name="invitee_username" required autofocus>
  </div>
  <p class="muted small">The user must already be a member of this workspace.</p>
  <button type="submit">Send invitation</button>
</form>
<a class="back-link" href="{{ url_for('channel', channel_id=channel_id) }}">&larr; Back to channel</a>
{% endblock %}
